name: Auto-Merge Hotfix

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested]
    branches:
      - main
  pull_request_target:
    types: [closed]
    branches:
      - main

jobs:
  merge_to_main:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'hotfix/')
    steps:
      - name: Check for approval and status checks
        id: check_pr
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const approvedReviews = reviews.filter(review => review.state === 'APPROVED');
            const hasApproval = approvedReviews.length > 0;

            const { data: status } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pullRequest.head.sha,
            });

            const allStatusChecksPassed = status.state === 'success';

            console.log(`PR #${context.issue.number} - Has Approval: ${hasApproval}, All Status Checks Passed: ${allStatusChecksPassed}, Mergeable: ${pullRequest.mergeable}`);

            if (hasApproval && allStatusChecksPassed && pullRequest.mergeable) {
              console.log('All conditions met for auto-merge to main.');
              core.setOutput('should_merge', true);
            } else {
              console.log('Conditions not met for auto-merge to main.');
              core.setOutput('should_merge', false);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge Pull Request to Main
        if: steps.check_pr.outputs.should_merge == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_COM_PERMISSAO_DE_MERGE }} # Use um PAT com permissão de merge

  merge_to_develop_and_delete_branch:
    runs-on: ubuntu-latest
    needs: merge_to_main
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'hotfix/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Merge Main into Develop
        run: |
          git checkout develop
          git pull origin develop
          git merge main --no-ff -m "Merge main (from hotfix ${{ github.event.pull_request.head.ref }}) into develop"
          git push origin develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete Hotfix Branch
        run: |
          gh api -X DELETE /repos/${{ github.repository }}/git/refs/heads/${{ github.event.pull_request.head.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
